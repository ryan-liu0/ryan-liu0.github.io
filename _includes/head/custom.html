{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="preload" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'">
<noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
</noscript>

<!-- Support for Font Awesome -->
<link rel="preload" href="{{ base_path }}/assets/css/fontawesome.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'">
<noscript>
    <link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.css">
</noscript>

<meta name="theme-color" content="var(--global-bg-color)" />

<!-- end custom head snippets -->

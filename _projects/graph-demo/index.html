layout: single
title: "Graph Demo"
author_profile: true

<link rel="stylesheet" href="{{ '/projects/graph-demo/graph-demo.css' | relative_url }}">

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

<div class="graph-demo-layout">
  <div id="cy"></div>

  <aside class="graph-settings">
    <button id="generate-btn">Generate Graph</button>

    <div class="setting-row">
      <label for="n">Setting 1. Number of nodes</label>
      <input id="n" type="number" value="15" min="2" max="100">
    </div>

    <div class="setting-row">
      <label for="max-edges">Setting 2. Maximum edges</label>
      <input id="max-edges" type="number" value="25" min="1" max="250">
    </div>

    <div class="setting-row">
      <label for="edge-prob">Setting 3. Edge probability</label>
      <input id="edge-prob" type="number" value="0.25" min="0" max="1" step="0.05">
    </div>
  </aside>
</div>

<script src="{{ '/projects/graph-demo/graph-demo.js' | relative_url }}"></script>

<link rel="stylesheet" href="{{ '/assets/css/graph-demo.css' | relative_url }}">

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

<section class="graph-demo-page">
  <div class="graph-settings">
    <div class="setting-row">
      <label for="n">Number of nodes</label>
      <input id="n" type="number" value="30" min="2" max="150">
    </div>

    <div class="setting-row">
      <label for="max-edges">Maximum edges</label>
      <input id="max-edges" type="number" value="60" min="1" max="500">
    </div>

    <div class="setting-row">
      <label for="edge-prob">Edge probability</label>
      <input id="edge-prob" type="number" value="0.6" min="0" max="1" step="0.05">
    </div>

    <div class="setting-row">
      <label for="min-weight">Minimum weight</label>
      <input id="min-weight" type="number" value="1" min="1" max="100">
    </div>

    <div class="setting-row">
      <label for="max-weight">Maximum weight</label>
      <input id="max-weight" type="number" value="20" min="1" max="100">
    </div>

    <button id="generate-btn">Generate Graph</button>
  </div>

  <div class="graph-panel">
    <div id="cy"></div>
  </div>
</section>

<script src="{{ '/assets/js/graph-demo.js' | relative_url }}"></script>

<!DOCTYPE html>
<html>

<head>
    <title>Graph Algorithm Demo</title>
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <style>
        #cy {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <h1>Graph Algorithm Demo</h1>

    <label>
        Number of nodes:
        <input id="n" type="number" value="10" min="2" max="100">
    </label>

    <button onclick="generateGraph()">Generate graph</button>

    <div id="cy"></div>

    <script>
        let cy;

        function generateGraph() {
            const n = Number(document.getElementById("n").value);

            const elements = [];

            for (let i = 0; i < n; i++) {
                elements.push({ data: { id: String(i), label: String(i) } });
            }

            for (let i = 0; i < n - 1; i++) {
                elements.push({
                    data: {
                        id: `${i}-${i + 1}`,
                        source: String(i),
                        target: String(i + 1)
                    }
                });
            }

            cy = cytoscape({
                container: document.getElementById("cy"),
                elements: elements,
                style: [
                    {
                        selector: "node",
                        style: {
                            "label": "data(label)",
                            "background-color": "#9D2235",
                            "color": "#222",
                            "text-valign": "center",
                            "text-halign": "center"
                        }
                    },
                    {
                        selector: "edge",
                        style: {
                            "width": 2,
                            "line-color": "#999"
                        }
                    }
                ],
                layout: {
                    name: "circle"
                }
            });
        }

        generateGraph();
    </script>
</body>

</html>
